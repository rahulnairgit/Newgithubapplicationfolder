# Deploy Application to Production Environment
# Triggers on push to main branch or manual trigger
# Requires approval before deployment
name: Deploy - Production Environment

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
  workflow_dispatch:  # Manual trigger

env:
  JAVA_VERSION: '17'
  WEB_APP_NAME: 'webapp-springboot-demo-prod'
  RESOURCE_GROUP: 'PRODUCTION'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app-prod
          path: target/*.jar

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: Production  # Requires approval
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app-prod
          path: target

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEB_APP_NAME }}
          package: target/*.jar

      - name: Deployment Summary
        run: |
          echo "### Production Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: **Production**" >> $GITHUB_STEP_SUMMARY
          echo "- Web App: ${{ env.WEB_APP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://${{ env.WEB_APP_NAME }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY

      - name: Azure Logout
        run: az logout
