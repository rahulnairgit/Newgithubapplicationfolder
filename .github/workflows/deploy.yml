# GitHub Actions workflow for Spring Boot Azure Web App deployment
# Multi-environment: develop branch → Dev, main branch → Production
# Optimized: Infrastructure deploys only when infra files change
name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:  # Allow manual trigger

env:
  JAVA_VERSION: '17'

permissions:
  id-token: write
  contents: read

jobs:
  # ============================================
  # DETECT WHAT CHANGED
  # ============================================
  check-changes:
    name: Check Changed Files
    runs-on: ubuntu-latest
    outputs:
      infra-changed: ${{ steps.changes.outputs.infra }}
      app-changed: ${{ steps.changes.outputs.app }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes
        id: changes
        run: |
          # Get changed files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          
          # Check if infra files changed
          if echo "$CHANGED_FILES" | grep -q "^infra/"; then
            echo "infra=true" >> $GITHUB_OUTPUT
            echo "Infrastructure files changed"
          else
            echo "infra=false" >> $GITHUB_OUTPUT
            echo "No infrastructure changes"
          fi
          
          # Check if app files changed (src, pom.xml)
          if echo "$CHANGED_FILES" | grep -qE "^(src/|pom.xml)"; then
            echo "app=true" >> $GITHUB_OUTPUT
            echo "Application files changed"
          else
            echo "app=false" >> $GITHUB_OUTPUT
            echo "No application changes"
          fi

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: check-changes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: target/*.jar

  # ============================================
  # DEVELOPMENT ENVIRONMENT (develop branch → Test RG)
  # ============================================
  deploy-infrastructure-dev:
    name: Deploy Infrastructure (Dev)
    runs-on: ubuntu-latest
    environment: Dev
    needs: [check-changes, build]
    # Only run if infra files changed OR manual trigger
    if: |
      github.ref == 'refs/heads/develop' && 
      github.event_name == 'push' && 
      (needs.check-changes.outputs.infra-changed == 'true' || github.event_name == 'workflow_dispatch')
    
    outputs:
      webAppName: ${{ steps.deploy.outputs.webAppName }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az group create --name Test --location eastus

      - name: Deploy Bicep
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: Test
          template: ./infra/main.bicep
          parameters: ./infra/parameters.json
          failOnStdErr: false

  deploy-app-dev:
    name: Deploy Application (Dev)
    runs-on: ubuntu-latest
    environment: Dev
    needs: [check-changes, build]
    # Always run for develop branch pushes (doesn't wait for infra if it was skipped)
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: target

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (Dev)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'webapp-springboot-demo-dev'
          package: target/*.jar

      - name: Azure Logout
        run: az logout

  # ============================================
  # PRODUCTION ENVIRONMENT (main branch → PRODUCTION RG)
  # ============================================
  deploy-infrastructure-prod:
    name: Deploy Infrastructure (Prod)
    runs-on: ubuntu-latest
    environment: Production
    needs: [check-changes, build]
    # Only run if infra files changed OR manual trigger
    if: |
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push' && 
      (needs.check-changes.outputs.infra-changed == 'true' || github.event_name == 'workflow_dispatch')
    
    outputs:
      webAppName: ${{ steps.deploy.outputs.webAppName }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az group create --name PRODUCTION --location eastus

      - name: Deploy Bicep
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: PRODUCTION
          template: ./infra/main.bicep
          parameters: ./infra/parameters-prod.json
          failOnStdErr: false

  deploy-app-prod:
    name: Deploy Application (Prod)
    runs-on: ubuntu-latest
    environment: Production
    needs: [check-changes, build]
    # Always run for main branch pushes (doesn't wait for infra if it was skipped)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: target

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (Prod)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'webapp-springboot-demo-prod'
          package: target/*.jar

      - name: Azure Logout
        run: az logout
